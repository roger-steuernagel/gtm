<main>
  <h1>{{ title }}</h1>

  <p>{{ completedCount }} / {{ tasks.length }} tasks completed</p>

  <button type="button" (click)="showHelloWorld()">Call PHP Hello API</button>

  <ul>
    <li *ngFor="let task of tasks">
      <label>
        <input
          type="checkbox"
          [checked]="task.completed"
          (change)="toggleTask(task.id)"
        />
        {{ task.title }}
      </label>
    </li>
  </ul>
</main>
